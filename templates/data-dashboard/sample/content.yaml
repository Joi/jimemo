    value: "394"
    delta: "+18 vs last week"
  - label: "Median resolution"
    value: "3.4h"
    delta: "-0.6h vs last week"
  - label: "CSAT"
    value: "4.6 / 5"
    delta: "+0.1 vs last week"
  - label: "Open backlog"
    value: "57"
    delta: "-9 vs last week"

