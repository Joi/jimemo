title: "Support Desk — Weekly Report"
subtitle: "Ticket volume, resolution time, and satisfaction across all channels."
period: "29 Jun – 5 Jul 2026"

intro: |
  Ticket volume held just under 400 for the third week running. Median
  resolution time improved for the second consecutive week, driven by
  the triage macros rolled out on 24 June. One P1 incident (a delayed
  payment webhook) was opened and resolved inside SLA.

